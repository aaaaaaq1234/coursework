<!DOCTYPE HTML>
<html>

<head>
    <title>Burnley canal festival 2025 website</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #FF5F15;
        }

        h1, h2, p {
            margin: 10px;
            color: white;
        }

        ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #305CDE;
        }

        ul li {
            float: left;
        }

        ul li a {
            display: block;
            color: white;
            text-align: center;
            padding: 33px 16px;
            text-decoration: none;
        }

        ul li a:hover {
            background-color: #FF5F15;
        }

        form {
            width: 400px;
            margin: 20px;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            font-size: 16px;
            padding: 10px;
        }

        button {
            font-size: 16px;
            padding: 10px 20px;
            cursor: pointer;
        }

        .side-by-side {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin: 20px;
        }
    
        .side-by-side img {
            width: 500px; height: auto;
            .big-image {
            width: 100%;
            max-width: 1400px;
            height: auto;
            display: block;
            margin: 30px auto;
        }}
    </style>
</head>

<body>

    <input type="text" name="name" required>

    <label>Your Email:</label>
    <input type="email" name="email" required>

    <label>Your Message:</label>
    <textarea name="message" required></textarea>

    <button type="submit">Send</button>
</form>
